<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Safora</title>

<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
}

.sidebar {
    width: 30%;
    background: #aed2f0;
    padding: 20px;
    box-sizing: border-box;
}

.chat-area {
    width: 70%;
    display: flex;
    flex-direction: column;
    background: #e5ddd5;
}

.chat-header {
    background: #406d89;
    color: white;
    padding: 15px;
    font-weight: bold;
}

.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.message {
    padding: 10px;
    margin: 5px;
    max-width: 60%;
    border-radius: 10px;
}

.sent {
    background: #ccc797;
    align-self: flex-end;
}

.received {
    background: rgb(223, 216, 216);
    align-self: flex-start;
}

.input-area {
    display: flex;
    padding: 10px;
    background: #866d6d;
}

input {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 5px;
}

button {
    padding: 10px;
    margin-left: 10px;
    background: #b7e3db;
    border: none;
    color: white;
    border-radius: 5px;
}

.online {
    color: green;
    font-weight: bold;
}

.offline {
    color: black;
}
/* ================= MOBILE RESPONSIVE ================= */

@media screen and (max-width: 768px) {

    body {
        flex-direction: column;
    }

    .sidebar {
        width: 100%;
        height: 35vh;
        overflow-y: auto;
    }

    .chat-area {
        width: 100%;
        height: 65vh;
    }

    .chat-header {
        text-align: center;
    }

    .message {
        max-width: 80%;
    }

    .input-area {
        padding: 8px;
    }

    input {
        font-size: 16px;  /* prevents zoom on mobile */
    }
}

</style>
</head>

<body>

<div class="sidebar">
    <h3>Safora</h3>
    <p>Logged in as: {{ username }}</p>
    <a href="/logout">Logout</a>

    <h3>Contacts</h3>

    <ul id="contactList">
        {% for user in users %}
            <li id="user-{{ user.username }}"
                onclick="selectUser('{{ user.username }}')"
                class="offline"
                style="cursor:pointer; padding:8px;">
                {{ user.username }}
            </li>
        {% endfor %}
    </ul>
</div>

<div class="chat-area">
    <div class="chat-header" id="chatWith">
        Select a user to start chat
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
        <input id="message" placeholder="Type a message">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
var socket = io();
var currentUser = "{{ username }}";
var selectedUser = "";
var currentRoom = null;
var typingTimeout;

// Select contact
function selectUser(user) {

    // Leave old room first
    if (currentRoom) {
        socket.emit("leave", { room: currentRoom });
    }

    selectedUser = user;

    // Create new room
    currentRoom = [currentUser, selectedUser].sort().join("_");

    document.getElementById("chatWith").innerText =
        "Chat with " + user;

    document.getElementById("messages").innerHTML = "";

    socket.emit("join", {
        sender: currentUser,
        receiver: selectedUser
    });
}

// Send message
function sendMessage() {

    if (!selectedUser) {
        alert("Please select a contact first.");
        return;
    }

    var msg = document.getElementById("message").value;
    if (msg.trim() === "") return;

    socket.emit("private_message", {
        sender: currentUser,
        receiver: selectedUser,
        message: msg
    });

    document.getElementById("message").value = "";
}

// Detect typing
document.getElementById("message").addEventListener("input", function() {

    if (!selectedUser) return;

    socket.emit("typing", {
        sender: currentUser,
        receiver: selectedUser
    });

});

// Show typing indicator
socket.on("show_typing", function(user) {

    if (user !== selectedUser) return;

    var typingDiv = document.getElementById("typingIndicator");

    if (!typingDiv) {
        typingDiv = document.createElement("div");
        typingDiv.id = "typingIndicator";
        typingDiv.style.fontStyle = "italic";
        typingDiv.style.margin = "5px";
        document.getElementById("messages").appendChild(typingDiv);
    }

    typingDiv.innerText = user + " is typing...";

    clearTimeout(typingTimeout);

    typingTimeout = setTimeout(function() {
        var typingDiv = document.getElementById("typingIndicator");
        if (typingDiv) typingDiv.remove();
    }, 1500);
});

// Receive message
socket.on("message", function(data) {

    // Determine which room this message belongs to
    let messageRoom = [data.sender, data.receiver].sort().join("_");

    // Only render if it matches current open room
    if (messageRoom !== currentRoom) return;

    // Prevent duplicate rendering
    if (document.getElementById("msg-" + data.id)) return;

    var messageDiv = document.createElement("div");
    messageDiv.classList.add("message");
    messageDiv.id = "msg-" + data.id;

    let date = new Date(data.timestamp);
    let formattedTime = date.toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
    });

    var content = data.sender + ": " + data.message + " (" + formattedTime + ")";

    if (data.sender === currentUser) {
        messageDiv.classList.add("sent");
        content += data.delivered ? " ✓✓" : " ✓";
    } else {
        messageDiv.classList.add("received");

        socket.emit("delivered", {
            id: data.id,
            sender: data.sender,
            receiver: currentUser
        });
    }

    messageDiv.innerText = content;
    document.getElementById("messages").appendChild(messageDiv);

    document.getElementById("messages").scrollTop =
        document.getElementById("messages").scrollHeight;
});

// Update ticks safely
socket.on("update_tick", function(data) {

    var msgDiv = document.getElementById("msg-" + data.id);

    if (msgDiv && msgDiv.classList.contains("sent")) {

        if (!msgDiv.innerText.includes("✓✓")) {
            msgDiv.innerText = msgDiv.innerText.replace(" ✓", " ✓✓");
        }
    }

});

// Online / Offline
socket.on("update_users", function(users) {

    document.querySelectorAll("#contactList li").forEach(function(item) {
        var name = item.innerText.trim();

        if (users.includes(name)) {
            item.classList.remove("offline");
            item.classList.add("online");
        } else {
            item.classList.remove("online");
            item.classList.add("offline");
        }
    });

});
</script>


</body>
</html>
