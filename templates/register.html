<!DOCTYPE html>
<html>
<head>
<title>Safora Register</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    display: flex;
    justify-content: center;
    align-items: center;
}

.register-box {
    width: 380px;
    background: white;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    position: relative;
}

.register-box h2 {
    text-align: center;
    margin-bottom: 30px;
    color: #0072ff;
}

.register-box input {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: none;
    border-bottom: 2px solid #0072ff;
    outline: none;
    font-size: 14px;
}

.register-box button {
    width: 100%;
    padding: 12px;
    background: #0072ff;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
    font-size: 15px;
}

.register-box button:hover {
    background: #005fd1;
}

.register-box a {
    display: block;
    text-align: center;
    margin-top: 15px;
    text-decoration: none;
    color: #0072ff;
    font-size: 14px;
}

.close-btn {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 18px;
    color: #0072ff;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="register-box">
    <div class="close-btn"></div>
    <h2>Sign Up</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>

        <button>Create Account</button>
    </form>

    <a href="/login">Already have an account? Sign in</a>
</div>

</body>
</html>
